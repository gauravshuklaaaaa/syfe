services:
  - type: web
    name: personal-finance-api
    env: java
    buildCommand: ./gradlew clean build -x test
    startCommand: >-
      DATABASE_URL=$(echo "$DATABASE_URL" | sed 's|^postgresql://|jdbc:postgresql://|')
      java -jar build/libs/app.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: DB_USERNAME
        fromDatabase:
          name: finance-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: finance-db
          property: password
      - key: PORT
        value: 8080

databases:
  - name: finance-db
    databaseName: financedb
    user: finance_user
