services:
  - type: web
    name: personal-finance-api
    env: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: DB_USERNAME
        fromDatabase:
          name: finance-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: finance-db
          property: password

databases:
  - name: finance-db
    databaseName: financedb
    user: finance_user
